<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ábrelas cuando...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-container">
        <h1>Ábrelas cuando...</h1>

        <div class="contenedor-sobres">
            <div class="sobre" data-id="triste">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">Estés triste</p>
            </div>
            <div class="sobre" data-id="mal_dia">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s2-1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">Tengas un mal día</p>
            </div>
            <div class="sobre" data-id="aniversario">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">Sea nuestro aniversario</p>
            </div>
            <div class="sobre" data-id="cumple">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">Sea tu cumple</p>
            </div>

            <div class="sobre" data-id="noche">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">🌙 La noche pese</p>
            </div>
            <div class="sobre" data-id="extranes">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s2-1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">💞 Me extrañes</p>
            </div>
            <div class="sobre" data-id="dormir">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">💗 No puedas dormir</p>
            </div>
            <div class="sobre" data-id="falta_algo">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">🫀 Te falte algo</p>
            </div>
            <div class="sobre" data-id="volver">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s2-1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">💌 Necesites volver a mí</p>
            </div>
            <div class="sobre" data-id="cancion">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">🎶 Una canción te rompa</p>
            </div>
            <div class="sobre" data-id="carta">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">📩 Quieras leerme</p>
            </div>
            <div class="sobre" data-id="mente">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s2-1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">💭 Tu mente no pare</p>
            </div>
            <div class="sobre" data-id="pecho">
                <img src="https://alemf.com/wp-content/uploads/2026/02/s1.png" alt="Sobre" class="sobre-imagen">
                <p class="sobre-titulo">🩹 Te duela el pecho</p>
            </div>
        </div>
    </div>

    <div id="modal-mensaje" class="modal">
        <div class="modal-contenido">
            <span class="cerrar">&times;</span>
            <div id="texto-mensaje"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
